{% extends 'base.html' %}

{% block content %}
<div class="p-8 max-w-4xl mx-auto">
  <a href="{% url 'vault' %}" class="text-blue-400 hover:text-blue-300 mb-6 inline-block">← Back to Vault</a>

  <div class="bg-slate-800 p-6 rounded-xl border border-slate-700 mb-6">
    <div class="flex justify-between items-start mb-4">
      <h1 class="text-3xl font-bold text-white">{{ report.ticker }}</h1>
      <span class="text-sm text-slate-400">{{ report.created_at|date:"Y-m-d H:i" }}</span>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-2">
      <p class="text-slate-300">Price: <span class="text-white font-mono">${{ report.current_price }}</span></p>
      <p class="text-slate-300">XGBoost Score:
        <span class="font-bold {% if report.prediction_score > 50 %}text-green-400{% else %}text-red-400{% endif %}">
          {{ report.prediction_score|floatformat:2 }}%
        </span>
      </p>
    </div>
  </div>

  <div class="bg-slate-900 p-6 rounded-xl text-slate-300 whitespace-pre-wrap leading-relaxed">
    {{ report.ai_report }}
  </div>
</div>
{% endblock %}

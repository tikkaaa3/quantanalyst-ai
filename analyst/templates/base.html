<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>QuantAnalyst AI</title>
    <!-- Tailwind for Styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- HTMX for React-like Interactivity -->
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
  </head>
  <body class="bg-slate-900 text-slate-100 font-sans">
    <div class="flex h-screen overflow-hidden">
      <!-- Sidebar / Navigation -->
      <aside class="w-64 bg-slate-800 border-r border-slate-700 p-6">
        <h1 class="text-xl font-bold text-blue-400 mb-8">QuantAnalyst</h1>
      <nav class="space-y-4">
          {% url 'dashboard' as url_dash %}
          <a href="{{ url_dash }}" 
            class="block transition-colors {% if request.path == url_dash %}text-white font-semibold{% else %}text-slate-400 hover:text-white{% endif %}">
            Dashboard
          </a>
          
          {% url 'analysis_lab' as url_lab %}
          <a href="{{ url_lab }}" 
            class="block transition-colors {% if request.path == url_lab %}text-white font-semibold{% else %}text-slate-400 hover:text-white{% endif %}">
            Analysis Lab
          </a>
          
          {% url 'vault' as url_vault %}
          <a href="{{ url_vault }}" 
            class="block transition-colors {% if url_vault in request.path %}text-white font-semibold{% else %}text-slate-400 hover:text-white{% endif %}">
            Vault
          </a>
      </nav>
      </aside>

      <!-- Main Content (The 3-Column Area) -->
      <main class="flex-1 overflow-y-auto">
        {% block content %}{% endblock %}
      </main>
    </div>

    <!-- CSRF token for HTMX POST requests -->
    <script>
      document.body.addEventListener("htmx:configRequest", (event) => {
        event.detail.headers["X-CSRFToken"] = "{{ csrf_token }}";
      });
    </script>
  </body>
</html>
